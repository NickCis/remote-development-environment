<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate" />
  <title>Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Nerd Font for Powerline/symbols in prompts (e.g. EMACS  nickcis  ~ ) so they render on Android Chrome */
    @font-face {
      font-family: 'JetBrainsMono Nerd Font';
      src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@master/patched-fonts/JetBrainsMono/Ligatures/Regular/JetBrainsMonoNerdFont-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    /* Monaspace Neon for file viewer code blocks */
    @font-face {
      font-family: 'Monaspace Neon';
      src: url('https://cdn.jsdelivr.net/gh/github/monaspace@v1.0.0/fonts/webfonts/MonaspaceNeon-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #0d1117;
      min-height: 100vh;
      padding: 0;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
      font-family: "Noto Sans", sans-serif;
    }
    body { overflow: hidden; }
    #terminal-wrap { position: fixed; width: 100%; left: 0; top: 0; right: 0; bottom: 0; }
    #terminal-container { width: 100%; height: 100%; min-height: 200px; }
    .xterm .xterm-viewport { -webkit-overflow-scrolling: touch; }
    .xterm, .xterm .xterm-viewport, .xterm .xterm-screen { touch-action: pan-y; }
    .float-btn {
      position: fixed; z-index: 100; top: 16px; width: 40px; height: 40px;
      border: none; border-radius: 8px; cursor: pointer; font-size: 18px;
      background: rgba(33, 38, 45, 0.92); color: #c9d1d9; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .float-btn:hover { background: rgba(48, 54, 61, 0.92); }
    .float-btn.left { left: 16px; }
    .float-btn.right { right: 16px; }
    .menu {
      position: fixed; z-index: 99; top: 64px; min-width: 200px; max-height: 70vh; overflow: auto;
      background: rgba(33, 38, 45, 0.92); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      padding: 8px 0; display: none;
    }
    .menu.open { display: block; }
    .menu.left { left: 16px; }
    .menu.right { right: 16px; }
    .menu-item {
      display: block; width: 100%; padding: 10px 16px; border: none; background: none;
      color: #c9d1d9; text-align: left; cursor: pointer; font-size: 14px;
      border-radius: 0; font-family: inherit;
    }
    .menu-item:hover { background: #30363d; }
    .menu-item.current { background: #388bfd33; color: #58a6ff; }
    .menu-item small { display: block; color: #8b949e; font-size: 11px; margin-top: 2px; }
    .menu-hr { border: none; height: 1px; background: #30363d; margin: 4px 0; }
    .toolbox-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; align-items: center; }
    .toolbox-row label { color: #8b949e; font-size: 12px; margin-right: 4px; }
    .toolbox-keys-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 8px 12px; }
    .toolbox-keys-grid .key-btn { min-width: 0; }
    .key-btn {
      padding: 6px 10px; border: 1px solid #30363d; border-radius: 4px; background: #0d1117;
      color: #c9d1d9; cursor: pointer; font-size: 12px; font-family: inherit;
    }
    .key-btn:hover { background: #21262d; }
    .key-btn.active,
    .key-btn.active:hover { background: #388bfd; border-color: #58a6ff; color: #fff; }
    #special-keyboard .key-btn.pressed { background: #388bfd; border-color: #58a6ff; color: #fff; }
    #special-keyboard {
      position: fixed; left: 0; right: 0; z-index: 98; display: none;
      background: rgba(22, 27, 34, 0.95); padding: 8px; border-top: 1px solid #30363d;
      flex-direction: column; gap: 6px; align-items: center;
      /* top/bottom set in JS from visualViewport */
    }
    #special-keyboard.open { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: auto auto; column-gap: 6px; row-gap: 2px; }
    #special-keyboard .keyboard-row { display: contents; }
    #special-keyboard .key-btn { min-width: 44px; }
    #special-keyboard .float-btn {
      position: static; width: 100%; height: auto; min-width: 44px;
      padding: 6px 10px; border: 1px solid #30363d; border-radius: 4px;
      background: #0d1117; color: #c9d1d9; font-size: 12px; font-family: inherit;
      box-shadow: none; z-index: auto;
    }
    #special-keyboard .float-btn:hover { background: #21262d; }
    #special-keyboard .keyboard-row-spacer { min-width: 0; min-height: 44px; }
    #toast {
      position: fixed; left: 50%; top: 12px; transform: translateX(-50%);
      z-index: 101; padding: 10px 16px; border-radius: 8px;
      background: rgba(33, 38, 45, 0.96); color: #c9d1d9;
      border: 1px solid #30363d; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      font-size: 14px; pointer-events: none; display: none;
    }
    #toast.show { display: block; animation: toast-in 0.2s ease; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    #auth-screen { display: none; position: fixed; inset: 0; z-index: 200; background: #0d1117; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    #auth-screen.visible { display: flex; }
    #auth-screen h1 { color: #c9d1d9; font-size: 1.5rem; margin: 0 0 16px; font-weight: 600; }
    #auth-screen p { color: #8b949e; margin: 0 0 24px; text-align: center; max-width: 360px; }
    #auth-screen .auth-btn { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-family: inherit; }
    #auth-screen .auth-btn:hover { background: #30363d; }
    #auth-screen .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #auth-screen .error { color: #f85149; margin-top: 12px; font-size: 14px; }
    #auth-screen .token-box { margin-top: 16px; padding: 12px; background: #21262d; border-radius: 8px; word-break: break-all; font-size: 12px; color: #8b949e; max-width: 100%; }
    #auth-screen .token-actions { margin-top: 8px; }
    #file-viewer-wrap { display: none; position: fixed; left: 0; right: 0; top: 0; bottom: 0; z-index: 50; flex-direction: column; background: #ffffff; padding-top: 56px; }
    #file-viewer-wrap.visible { display: flex; }
    #file-viewer-breadcrumb { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #d0d7de; background: #f6f8fa; color: #57606a; font-size: 14px; }
    #file-viewer-breadcrumb .file-viewer-breadcrumb-trail { flex: 1; min-width: 0; }
    #file-viewer-breadcrumb a { color: #0969da; text-decoration: none; }
    #file-viewer-breadcrumb a:hover { text-decoration: underline; color: #0550ae; }
    .file-viewer-copy-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; padding: 0; border: 1px solid #d0d7de; border-radius: 6px; background: #ffffff; color: #57606a; cursor: pointer; flex-shrink: 0; }
    .file-viewer-copy-btn:hover { background: #f6f8fa; color: #0969da; border-color: #0969da; }
    .file-viewer-copy-btn svg { width: 16px; height: 16px; }
    #file-viewer-content { flex: 1; overflow: auto; padding: 16px; background: #ffffff; min-width: 0; }
    #file-viewer-list .file-viewer-row { display: flex; align-items: center; padding: 6px 0; color: #24292f; font-size: 14px; border-bottom: 1px solid #d0d7de; }
    #file-viewer-list .file-viewer-row a { color: #0969da; text-decoration: none; }
    #file-viewer-list .file-viewer-row a:hover { text-decoration: underline; color: #0550ae; }
    #file-viewer-list .file-viewer-row .size { color: #57606a; margin-left: 12px; font-size: 12px; }
    .file-viewer-blob { margin: 0; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; display: inline-block; min-width: 100%; }
    .file-viewer-blob pre { margin: 0; padding: 16px; overflow: auto; font-family: "Monaspace Neon", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; line-height: 1.5; color: #24292f; }
    .file-viewer-blob .line-numbers { float: left; text-align: right; padding-right: 16px; margin-right: 16px; border-right: 1px solid #d0d7de; color: #57606a; user-select: none; }
    .file-viewer-blob .line-content { overflow: visible; }
    .file-viewer-blob .line-table { border-collapse: collapse; width: max-content; min-width: 100%; }
    .file-viewer-blob .line-table .line-num { text-align: right; padding-right: 16px; color: #57606a; user-select: none; width: 1%; white-space: nowrap; background: #f6f8fa; }
    .file-viewer-blob .line-table .line-content { padding-left: 8px; white-space: pre; overflow: visible; font-family: "Monaspace Neon", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; line-height: 1.5; color: #24292f; background: #ffffff; }
    .file-viewer-truncated { padding: 12px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; margin-bottom: 12px; color: #57606a; font-size: 14px; }
    .file-viewer-truncated a { color: #0969da; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
</head>
<body>
  <div id="auth-screen">
    <div id="auth-content"></div>
  </div>
  <div id="toast" aria-live="polite"></div>
  <button type="button" class="float-btn left" id="sessions-btn" title="Sessions">≡</button>
  <div class="menu left" id="sessions-menu"></div>

  <button type="button" class="float-btn right" id="toolbox-btn" title="Toolbox">⌘</button>
  <div class="menu right" id="toolbox-menu"></div>

  <div id="terminal-wrap">
    <div id="terminal-container"></div>
  </div>

  <div id="file-viewer-wrap">
    <div id="file-viewer-breadcrumb"></div>
    <div id="file-viewer-content"></div>
  </div>

  <div id="special-keyboard"></div>

  <script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-html.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="/app.js"></script>
</body>
</html>
